<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Community Guardian{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo">Community Guardian</a>
            <div class="nav-links">
                <a href="/">Incidents</a>
                <a href="/incidents/new" class="btn btn-primary">Report Incident</a>
            </div>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>Community Guardian &mdash; Prototype for Palo Alto Networks Case Study</p>
    </footer>
</body>
</html>
